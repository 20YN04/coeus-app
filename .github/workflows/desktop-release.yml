name: desktop-release

# Build the local-first Coeus desktop installers (macOS + Windows) and attach
# them to a draft GitHub Release. Each installer bundles the static kennisbank
# UI (desktop/) + the PyInstaller brein sidecar (built per-OS from the repo root).
#
# Monorepo: brein lives at the repo root, the desktop app under desktop/.
# Trigger: push a tag like `v0.1.0`, or run manually.
#
# Optional repo variables (per-client white-label; unset → default Coeus):
#   COEUS_TENANT_NAME, COEUS_TENANT_SLUG, COEUS_TENANT_ACCENT

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # create the release + upload installers

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon (arm64)
          - os: windows-latest # x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build brein sidecar (PyInstaller)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          python build_sidecar.py

      - name: Stage sidecar into Tauri resources
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          cp -R dist/coeus-brein desktop/src-tauri/binaries/coeus-brein

      - name: Assert sidecar binary is staged
        shell: bash
        # Without this, a failed/empty copy would silently produce an installer
        # whose app falls back to "dev brein on :8765" and never starts a backend.
        run: |
          bin=$(ls desktop/src-tauri/binaries/coeus-brein/coeus-brein* 2>/dev/null | head -1)
          if [ -z "$bin" ] || [ ! -s "$bin" ]; then
            echo "::error::brein sidecar missing or empty in desktop/src-tauri/binaries/coeus-brein"
            ls -la desktop/src-tauri/binaries/coeus-brein || true
            exit 1
          fi
          echo "sidecar staged: $bin ($(du -h "$bin" | cut -f1))"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install JS deps
        working-directory: desktop
        run: npm ci

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Build + draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — signs the installers, emits each artifact's `.sig`
          # plus the `latest.json` manifest, and uploads them to the release so
          # installed apps can verify + self-update. Keypair generated locally with
          # `npx @tauri-apps/cli signer generate`; the matching PUBLIC key is in
          # desktop/src-tauri/tauri.conf.json under plugins.updater.pubkey.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Baked into the static export (per-client white-label; defaults if unset).
          NEXT_PUBLIC_BREIN_URL: http://127.0.0.1:8765
          NEXT_PUBLIC_TENANT_NAME: ${{ vars.COEUS_TENANT_NAME }}
          NEXT_PUBLIC_TENANT_SLUG: ${{ vars.COEUS_TENANT_SLUG }}
          NEXT_PUBLIC_TENANT_ACCENT: ${{ vars.COEUS_TENANT_ACCENT }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Coeus ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
