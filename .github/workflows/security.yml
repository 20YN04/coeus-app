# Security scanning for the Coeus monorepo: dependency audits (npm + cargo + pip),
# secret scanning, and CodeQL static analysis (JS/TS + Python). Runs on push to
# main, on PRs, and weekly. None of these jobs block a release — they surface
# findings. Paths reflect the monorepo: desktop app under desktop/, brein at root.

name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependencies:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: npm audit (high+)
        working-directory: desktop
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: cargo-audit (Rust deps)
        run: |
          cargo install cargo-audit --locked || true
          cd desktop/src-tauri && cargo audit
        continue-on-error: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit (brein deps)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt
        continue-on-error: true

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      # Informational: gitleaks-action can need a licence/config; never block a merge.
      - uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # CodeQL + dependency-review require GitHub Advanced Security, which a private
  # repo doesn't have by default — so they can't pass here. Kept (they light up
  # automatically once GHAS is enabled) but marked continue-on-error so they
  # surface findings without blocking merges. The real gate is ci.yml.
  codeql:
    name: CodeQL
    # CodeQL needs GitHub Advanced Security, which a private repo lacks by default
    # — it publishes its own failing check-run regardless of continue-on-error.
    # Gated off so the board is green; set repo variable ENABLE_CODEQL=true after
    # enabling GHAS to turn it on.
    if: ${{ vars.ENABLE_CODEQL == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@v3
        continue-on-error: true
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
        continue-on-error: true

  dependency-review:
    name: Dependency review (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: high
