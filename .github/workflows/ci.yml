name: ci

# The real merge gate: does it build, typecheck, lint, and compile?
# Runs on every PR and on push to main. Make this a required status check in the
# branch ruleset so a PR can't merge until these are green.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Desktop app (types, lint, static build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install
        working-directory: desktop
        run: npm ci
      - name: Typecheck
        working-directory: desktop
        run: npx tsc --noEmit
      - name: Lint
        working-directory: desktop
        run: npx eslint
      - name: Build (static export)
        working-directory: desktop
        run: npm run build

  rust:
    name: Tauri shell (cargo check)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Placeholders for bundle resources (real ones are built in release CI)
        run: |
          mkdir -p desktop/src-tauri/binaries/coeus-brein desktop/out
          echo placeholder > desktop/src-tauri/binaries/coeus-brein/coeus-brein
          echo '<!doctype html><title>placeholder</title>' > desktop/out/index.html
      - name: cargo check
        working-directory: desktop/src-tauri
        run: cargo check

  brein:
    name: Brein (import smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + import smoke
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import main; from brain.memory import Memory; from brain.learner import Learner; print('brein imports OK')"
