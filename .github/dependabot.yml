# Keeps dependencies and GitHub Actions patched across the monorepo:
# the desktop app (npm + cargo) and the brein (pip). github-actions updates also
# let you pin actions to commit SHAs and have them bumped automatically.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/desktop"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: cargo
    directory: "/desktop/src-tauri"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
