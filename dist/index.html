<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coeus</title>
    <style>
      :root {
        --c-field: #0000f2;
        --c-ink: #f4f2fb;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: grid;
        place-items: center;
        background: var(--c-field);
        color: var(--c-ink);
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        text-align: center;
        padding: 2rem;
      }
      .mark {
        font-size: 4rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      p {
        font-family: ui-monospace, "JetBrains Mono", monospace;
        font-size: 0.8rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        opacity: 0.7;
        max-width: 28ch;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="mark">Coeus</div>
      <p>Geen verbinding met je kennisbank. Controleer je internet en open de app opnieuw.</p>
    </div>
  </body>
</html>
